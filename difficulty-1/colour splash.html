<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colour splash</title>
</head>
<body>
    <center>
    <h1>Color Splash</h1>
    <p>Click a color and watch the box change</p>
    </center>
    <style>
        p{
            color: grey;
        }
    </style>
    <div class="swatch-btn">
        <button style="background: rgba(255, 0, 157, 0.555);" id="pink" onclick="changecolor(box,'rgba(255, 0, 157, 0.555)'); changetext(box,'Pink')"></button>
        <button style="background: rgba(255, 166, 0, 0.664);" id="orange" onclick="changecolor(box,'rgba(255, 166, 0, 0.664)'); changetext(box,'Orange')"></button>
        <button style="background: rgb(241, 241, 0);" id="yellow" onclick="changecolor(box,'rgba(241, 241, 0)'); changetext(box,'Yellow')"></button>
        <button style="background: rgba(0, 204, 0, 0.603);" id="green" onclick="changecolor(box,'rgba(0, 204, 0, 0.603)'); changetext(box,'Green')"></button>
        <button style="background: rgba(0, 140, 255, 0.534);" id="blue" onclick="changecolor(box,'rgba(0, 140, 255, 0.534)'); changetext(box,'Blue')"></button>
        <button style="background: rgba(175, 0, 175, 0.493);" id="purple" onclick="changecolor(box,'rgba(175, 0, 175, 0.493)'); changetext(box,'Purple')"></button>
    </div>
    <style>
        .swatch-btn{
            position: relative;
            justify-self: center;
            align-self: center;
        }
        #pink{
            padding: 30px 30px;
            border-radius: 60px;
            border-width: 1px;
        }
        #orange{
            padding: 30px 30px;
            border-radius: 60px;
            border-width: 1px;
        }
        #yellow{
            padding: 30px 30px;
            border-radius: 60px;
            border-width: 1px;
        }
        #green{
            padding: 30px 30px;
            border-radius: 60px;
            border-width: 1px;
        }
        #blue{
            padding: 30px 30px;
            border-radius: 60px;
            border-width: 1px;
        }
        #purple{
            padding: 30px 30px;
            border-radius: 60px;
            border-width: 1px;
        }
    </style>
    <div class="box" id="box">Pick a colour</div>
    <style>
        .box{
            justify-self: center;
            align-self: center;
            background:lightgray;
            color:rgb(255, 255, 255);
            height: 100px;
            width: 500px;
            justify-content: center;
            align-content: center;
            text-align: center;
            margin-top: 50px;
            border-radius: 10px;
        }
    </style>
    <script>
        function changecolor(element,color){
            element.style.background=color
        }
        function changetext(element,text){
            element.textContent=text
        }
    </script>
</body>
</html>
