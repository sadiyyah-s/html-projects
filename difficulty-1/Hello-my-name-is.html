<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name-tag</title>
</head>
<body>
    <div class="header">
        <center><h1> Hello, My Name Is...</h1>
        <p>Type below and watch the tag update live</p>
        <input
        id="name-input"
        oninput="updateName()"
        type="text" 
        placeholder="Type your name..."></center>
        <style> h1{ 
            display: flex;
            position: relative;
            align-items: center;
            justify-content: center;
        }
        p{
            color:grey;
            font-size: 20px;
        }
        input{
            width: 18rem;
            height:3rem;
            font-size: medium;
        }
        </style>
    </div>

    <div class="section">
        <center><p>HELLO!<br>my name is </p></center>
        <p id="name-display"></p>
        <center><div id="display-name">
            👋
        </div></center>
                <style>
            p{
                color: azure;
                ;
            }
            div.section{
                background-color:skyblue;
                padding-bottom: 30px;
            }
            #display-name{
                height: 5rem;
                background-color: aliceblue;
                width:18rem;
                position: relative;
                align-content: center;
                justify-content: center;
                font-size: 30px;
            }
        </style>
    </div>

        <script>
            function updateName(){
                let input=document.getElementById('name-input');
                let nameDisplay=document.getElementById('display-name');
                if(input.value.length>0){
                    nameDisplay.textContent=input.value;
                }else{
                    nameDisplay.textContent="👋";
                }
            }
        </script>
</body>
</html>
